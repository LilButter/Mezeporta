<!DOCTYPE html>
<html lang="en" data-theme="mhflauncher">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="/fonts/ZenAntique-Regular.ttf" />
    <title>MHF Launcher</title>
    <style>
      html,
      body,
      #app {
        margin: 0;
        width: 100vw;
        height: 100vh;
        overflow: hidden;
        position: relative;
        background:
          radial-gradient(circle at center, #1f1a12 0%, #0b0b0b 70%);
      }

      #app:empty::before,
      #app:empty::after {
        content: "";
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        background-repeat: no-repeat;
        background-position: center;
        background-size: contain;
      }

      #app:empty::before {
        top: calc(50% - 92px);
        width: min(320px, 56vw);
        height: 96px;
        background-image: url("/headers/PS4/MezeportaPS4.png");
      }

      #app:empty::after {
        top: calc(50% + 18px);
        width: min(320px, 56vw);
        height: 44px;
        background-image: url("/extra/Now-Loading.gif");
      }
    </style>

    <!-- Vite / Tauri entry point -->
    <script type="module" src="/src/main.js"></script>
  </head>

  <body>
    <!-- NOTE: no hard-coded background class anymore;
         main.js will set background-image at runtime -->
    <div id="app" class="select-none h-screen w-screen bg-contain"></div>
  </body>
</html>
